services:
  - type: web
    name: portfolio-website
    runtime: python
    buildCommand: ./build.sh
    startCommand: gunicorn portfolio.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.16"
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        sync: false 
      - key: DATABASE_URL
        sync: false 
      - key: DJANGO_EMAIL_USER
        sync: false # You will enter 'aryanpawar04120@gmail.com' safely in the Render UI
      - key: HOST_PASSWORD
        sync: false 
      - key: DJANGO_SUPERUSER_USERNAME
        value: "aryanpawar4912"
      - key: DJANGO_SUPERUSER_EMAIL
        value: "aryanpawar04120@gmail.com"
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false