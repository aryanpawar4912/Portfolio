{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Engine Dashboard{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/admin-dashboard.css' %}">
    <link rel="shortcut icon" href="{% static 'images/logo.png' %}" type="image/x-icon">
    <style>
        /* Specific sidebar override styling for the lower logout button variant */
        .logout-btn {
            background: #fee2e2 !important;
            color: #ef4444 !important;
            text-decoration: none;
            padding: 12px 16px;
            margin-top: 20px; /* Separates logout structurally from navigation items */
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            display: block;
            transition: all 0.2s ease;
        }

        .logout-btn:hover {
            background: #ef4444 !important;
            color: white !important;
        }
    </style>
    
    {% block extra_head %}{% endblock %}
</head>
<body>
    <div class="dashboard-container">
        <div class="header">
            <h1>📋 Portfolio Analytics Engine</h1>
            <a href="{% url 'admin_logout' %}" class="exit-btn">Exit Dashboard</a>
        </div>

        <div class="sidebar-layout">
            <div class="sidebar-nav">
                <a href="{% url 'admin_dashboard' %}">Dashboard</a>
                <a href="{% url 'admin_contacts' %}">Contacts</a>
                <a href="{% url 'admin_analytics' %}">Analytics</a>
                <a href="{% url 'admin_project' %}">Projects</a>
                <a href="{% url 'admin_create_post' %}">Blogs</a>
                <a href="{% url 'admin_logout' %}" class="logout-btn">Logout</a>
            </div>

            <div>
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>
</body>
</html>
