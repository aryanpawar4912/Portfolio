<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Gateway - Admin Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at 50% 30%, #1e293b 0%, #0f172a 100%);
            color: #f3f4f6;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 40px rgba(59, 130, 246, 0.1);
            width: 100%;
            max-width: 420px;
            text-align: center;
        }

        .brand-icon {
            font-size: 40px;
            margin-bottom: 20px;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 80px;
            height: 80px;
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.15);
        }

        .login-card h2 {
            color: #ffffff;
            font-size: 24px;
            margin-bottom: 8px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .login-card p {
            color: #9ca3af;
            font-size: 14px;
            margin-bottom: 32px;
        }

        .alert-box {
            background: rgba(239, 68, 68, 0.1);
            color: #f87171;
            padding: 14px 16px;
            border-radius: 12px;
            font-size: 13px;
            margin-bottom: 24px;
            border: 1px solid rgba(239, 68, 68, 0.2);
            text-align: left;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 24px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            color: #9ca3af;
            margin-bottom: 8px;
            font-weight: 600;
            letter-spacing: 0.75px;
        }

        .form-control {
            width: 100%;
            padding: 14px 18px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            font-size: 15px;
            color: #ffffff;
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .form-control:focus {
            border-color: #3b82f6;
            background: rgba(15, 23, 42, 0.8);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15), inset 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .form-control::placeholder {
            color: #4b5563;
        }

        .btn-login {
            background: #3b82f6;
            color: white;
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.2s ease;
            margin-top: 8px;
            letter-spacing: 0.3px;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .btn-login:hover {
            background: #2563eb;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .back-home {
            display: inline-block;
            margin-top: 32px;
            color: #6b7280;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .back-home:hover {
            color: #3b82f6;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="brand-icon">🔐</div>
        <h2>Terminal Registry</h2>
        <p>Administrative Access Gateway</p>

        {% if messages %}
            {% for message in messages %}
                <div class="alert-box">
                    <span>⚠️</span> {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="id_username">Username</label>
                <input type="text" name="username" id="id_username" class="form-control" placeholder="Identity handles" autocomplete="username" required autofocus>
            </div>

            <div class="form-group">
                <label for="id_password">Security Key</label>
                <input type="password" name="password" id="id_password" class="form-control" placeholder="••••••••" autocomplete="current-password" required>
            </div>

            <button type="submit" class="btn-login">Authenticate Gateway</button>
        </form>

        <a href="{% url 'home' %}" class="back-home">← Return to Public Portfolio Website</a>
    </div>

</body>
</html>
